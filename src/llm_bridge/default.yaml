# LLM-Bridge default configuration
# User override: ~/.llm-bridge/config.yaml or --config <path>

server:
  host: "127.0.0.1"   # keep loopback-only unless you know what you're doing
  port: 8787
  api_key: ""          # set to require Authorization: Bearer <key>; or LLM_BRIDGE_API_KEY env var

# All providers use official CLI/SDK harnesses (subscription-sanctioned).
providers:
  claude:
    enabled: true
    cli_path: "claude"   # informational; the bundled Agent SDK CLI is used
    api_key: ""          # optional; enables dynamic model listing via the free
                         # Models API (or set ANTHROPIC_API_KEY). Never used for inference.
  codex:
    enabled: true
    cli_path: "codex"
    ignore_user_config: true   # skip ~/.codex skills/plugins (saves ~20k input tokens/request)
  agy:
    enabled: true
    cli_path: "agy"   # Antigravity CLI; adjust if installed as agy-cli

routing:
  default_model: "claude/claude-sonnet-5"
  aliases:
    fable: "claude/claude-fable-5"
    opus: "claude/claude-opus-4-8"
    sonnet: "claude/claude-sonnet-5"
    haiku: "claude/claude-haiku-4-5"
    gemini-pro: "agy/gemini-3.1-pro-high"
    flash: "agy/gemini-3.5-flash-medium"

logging:
  level: "INFO"
