<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM-Bridge</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #212121;
  --bg-secondary: #171717;
  --bg-tertiary: #2f2f2f;
  --bg-hover: #383838;
  --bg-message-user: #303030;
  --text-primary: #ececec;
  --text-secondary: #b4b4b4;
  --text-muted: #888;
  --border: #444;
  --accent: #10a37f;
  --accent-hover: #0d8a6a;
  --sidebar-width: 260px;
  --input-bg: #303030;
  --code-bg: #1e1e1e;
  --scrollbar-thumb: #555;
}

html, body { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  overflow: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  transition: transform 0.2s;
}

.sidebar-header {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}

.new-chat-btn {
  width: 100%;
  padding: 10px 16px;
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.15s;
}
.new-chat-btn:hover { background: var(--bg-hover); }
.new-chat-btn svg { width: 18px; height: 18px; }

.conversations {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.conv-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.conv-item:hover { background: var(--bg-hover); }
.conv-item.active { background: var(--bg-tertiary); color: var(--text-primary); }

.conv-item .delete-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  font-size: 16px;
  line-height: 1;
  flex-shrink: 0;
}
.conv-item:hover .delete-btn { display: block; }
.conv-item .delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

.conv-title { overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
.conv-streaming {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}

/* ===== Main ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-shrink: 0;
  background: var(--bg-primary);
}

.menu-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text-primary);
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
}
.menu-btn:hover { background: var(--bg-hover); }

.model-select {
  padding: 7px 12px;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  outline: none;
  min-width: 200px;
}
.model-select:focus { border-color: var(--accent); }
.model-select option { background: var(--bg-tertiary); }

.provider-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg-tertiary);
  color: var(--text-muted);
  white-space: nowrap;
}

.topbar-spacer { flex: 1; }

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}
.status-dot.offline { background: #ef4444; }

/* ===== Chat area ===== */
.chat-container {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.messages {
  max-width: 768px;
  width: 100%;
  margin: 0 auto;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--text-secondary);
  gap: 12px;
  padding: 60px 20px;
}
.welcome h1 { font-size: 24px; font-weight: 600; color: var(--text-primary); }
.welcome p { font-size: 15px; max-width: 500px; text-align: center; line-height: 1.6; }

/* Message */
.message {
  display: flex;
  gap: 16px;
  line-height: 1.7;
  font-size: 15px;
}

.message-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
}

.message.user .message-avatar { background: #5b5fc7; color: #fff; }
.message.assistant .message-avatar { background: var(--accent); color: #fff; }

.message-body {
  flex: 1;
  min-width: 0;
}

.message-role {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
}

.message-content {
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.message-content p { margin-bottom: 12px; }
.message-content p:last-child { margin-bottom: 0; }
.message-content ul, .message-content ol { margin: 8px 0; padding-left: 24px; }
.message-content li { margin-bottom: 4px; }
.message-content blockquote {
  border-left: 3px solid var(--border);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}

/* Code blocks */
.message-content pre {
  background: var(--code-bg);
  border-radius: 8px;
  margin: 12px 0;
  overflow: hidden;
}

.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: #333;
  font-size: 12px;
  color: var(--text-muted);
}

.copy-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 4px;
}
.copy-btn:hover { color: var(--text-primary); background: var(--bg-hover); }

.message-content pre code {
  display: block;
  padding: 14px;
  overflow-x: auto;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo, monospace;
  font-size: 13px;
  line-height: 1.5;
}

.message-content :not(pre) > code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
}

/* Thinking */
.thinking-block {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: 8px 0;
  overflow: hidden;
}
.thinking-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  border: none;
  width: 100%;
  text-align: left;
}
.thinking-toggle:hover { background: var(--bg-hover); }
.thinking-content {
  display: none;
  padding: 12px;
  font-size: 13px;
  color: var(--text-secondary);
  border-top: 1px solid var(--border);
  line-height: 1.6;
}
.thinking-content.open { display: block; }

/* Streaming cursor */
.streaming-cursor::after {
  content: "";
  display: inline-block;
  width: 7px;
  height: 18px;
  background: var(--text-primary);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Message meta */
.message-meta {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  gap: 12px;
}

/* ===== Input area ===== */
.input-area {
  padding: 16px;
  flex-shrink: 0;
  background: var(--bg-primary);
}

.input-wrapper {
  max-width: 768px;
  margin: 0 auto;
  position: relative;
}

.input-box {
  display: flex;
  align-items: flex-end;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 8px 12px;
  transition: border-color 0.15s;
}
.input-box:focus-within { border-color: var(--accent); }

.input-box textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 15px;
  line-height: 1.5;
  resize: none;
  outline: none;
  max-height: 200px;
  padding: 4px 0;
  font-family: inherit;
}
.input-box textarea::placeholder { color: var(--text-muted); }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--accent);
  border: none;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn svg { width: 18px; height: 18px; }

.stop-btn {
  background: #ef4444;
}
.stop-btn:hover { background: #dc2626; }

.input-footer {
  text-align: center;
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-muted);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: block; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
  .overlay.open { display: block; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="new-chat-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      New Chat
    </button>
  </div>
  <div class="conversations" id="convList"></div>
  <div class="sidebar-footer">LLM-Bridge v0.1.0</div>
</aside>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Main -->
<div class="main">
  <!-- Top bar -->
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <select class="model-select" id="modelSelect" onchange="onModelChange()"></select>
    <span class="provider-badge" id="providerBadge">-</span>
    <div class="topbar-spacer"></div>
    <div class="status-dot" id="statusDot" title="Server status"></div>
  </div>

  <!-- Chat -->
  <div class="chat-container" id="chatContainer">
    <div class="messages" id="messagesEl">
      <div class="welcome" id="welcome">
        <h1>LLM-Bridge</h1>
        <p>Multi-model AI proxy gateway. Select a model above and start chatting.</p>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <div class="input-box">
        <textarea id="userInput" rows="1" placeholder="Send a message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-footer">Enter to send, Shift+Enter for newline</div>
    </div>
  </div>
</div>

<script>
// ===== State =====
const API_BASE = window.location.origin;
let conversations = JSON.parse(localStorage.getItem('llm-bridge-convs') || '[]');
let currentConvId = null;
// Per-conversation streaming state: { convId: AbortController }
const streamingConvs = new Map();
let models = [];

// ===== Init =====
async function init() {
  await loadModels();
  renderConvList();
  if (conversations.length > 0) {
    switchConv(conversations[0].id);
  }
  checkHealth();
}

async function loadModels() {
  try {
    const resp = await fetch(`${API_BASE}/v1/models`);
    const data = await resp.json();
    models = data.data || [];
    const select = document.getElementById('modelSelect');
    select.innerHTML = '';

    // Group by provider
    const groups = {};
    models.forEach(m => {
      const [prov] = m.id.split('/');
      if (!groups[prov]) groups[prov] = [];
      groups[prov].push(m);
    });

    for (const [prov, items] of Object.entries(groups)) {
      const optgroup = document.createElement('optgroup');
      optgroup.label = prov.charAt(0).toUpperCase() + prov.slice(1);
      items.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.id;
        optgroup.appendChild(opt);
      });
      select.appendChild(optgroup);
    }

    // Restore last used model
    const saved = localStorage.getItem('llm-bridge-model');
    if (saved && models.some(m => m.id === saved)) {
      select.value = saved;
    }
    onModelChange();
  } catch(e) {
    console.error('Failed to load models:', e);
  }
}

async function checkHealth() {
  try {
    const resp = await fetch(`${API_BASE}/admin/health`);
    const data = await resp.json();
    const dot = document.getElementById('statusDot');
    const allHealthy = Object.values(data.providers).some(p => p.healthy);
    dot.className = allHealthy ? 'status-dot' : 'status-dot offline';
    dot.title = Object.entries(data.providers).map(([k,v]) => `${k}: ${v.status}`).join('\n');
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot offline';
  }
}

function onModelChange() {
  const model = document.getElementById('modelSelect').value;
  const [prov] = model.split('/');
  document.getElementById('providerBadge').textContent = prov;
  localStorage.setItem('llm-bridge-model', model);
  // Save to current conversation
  const conv = getCurrentConv();
  if (conv) {
    conv.model = model;
    saveConvs();
  }
}

// ===== Conversations =====
function saveConvs() {
  localStorage.setItem('llm-bridge-convs', JSON.stringify(conversations));
}

function newChat() {
  const defaultModel = localStorage.getItem('llm-bridge-model') || (models[0]?.id ?? '');
  const conv = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    title: 'New Chat',
    messages: [],
    model: defaultModel,
    createdAt: Date.now(),
  };
  conversations.unshift(conv);
  saveConvs();
  switchConv(conv.id);
  renderConvList();
  closeSidebar();
}

function switchConv(id) {
  currentConvId = id;
  // Restore this conversation's model
  const conv = getCurrentConv();
  if (conv && conv.model) {
    const select = document.getElementById('modelSelect');
    if (models.some(m => m.id === conv.model)) {
      select.value = conv.model;
    }
  }
  const model = document.getElementById('modelSelect').value;
  const [prov] = (model || '/').split('/');
  document.getElementById('providerBadge').textContent = prov;
  renderConvList();
  renderMessages();
  updateSendBtn();
  document.getElementById('userInput').focus();
}

function deleteConv(id, e) {
  e.stopPropagation();
  conversations = conversations.filter(c => c.id !== id);
  saveConvs();
  if (currentConvId === id) {
    currentConvId = conversations.length > 0 ? conversations[0].id : null;
  }
  renderConvList();
  renderMessages();
}

function getCurrentConv() {
  return conversations.find(c => c.id === currentConvId);
}

function renderConvList() {
  const el = document.getElementById('convList');
  el.innerHTML = conversations.map(c => {
    const isActive = c.id === currentConvId;
    const isRunning = streamingConvs.has(c.id);
    const indicator = isRunning ? '<span class="conv-streaming" title="Generating..."></span>' : '';
    return `<div class="conv-item ${isActive ? 'active' : ''}" onclick="switchConv('${c.id}')">
      <span class="conv-title">${indicator}${escapeHtml(c.title)}</span>
      <button class="delete-btn" onclick="deleteConv('${c.id}', event)" title="Delete">&times;</button>
    </div>`;
  }).join('');
}

// ===== Messages =====
function renderMessages() {
  const conv = getCurrentConv();
  const el = document.getElementById('messagesEl');

  if (!conv || conv.messages.length === 0) {
    el.innerHTML = `<div class="welcome" id="welcome">
      <h1>LLM-Bridge</h1>
      <p>Multi-model AI proxy gateway. Select a model above and start chatting.</p>
    </div>`;
    return;
  }

  el.innerHTML = conv.messages.map((msg, i) => renderMessage(msg, i)).join('');
  highlightAll();
  scrollToBottom();
}

function renderMessage(msg, index) {
  const isUser = msg.role === 'user';
  const avatar = isUser ? 'U' : 'AI';
  const roleName = isUser ? 'You' : (msg.model || 'Assistant');
  const html = isUser ? `<p>${escapeHtml(msg.content)}</p>` : renderMarkdown(msg.content || '');
  const meta = msg.usage ? `<div class="message-meta"><span>${msg.usage.prompt_tokens}in / ${msg.usage.completion_tokens}out</span><span>${msg.model || ''}</span></div>` : '';

  return `<div class="message ${msg.role}">
    <div class="message-avatar">${avatar}</div>
    <div class="message-body">
      <div class="message-role">${escapeHtml(roleName)}</div>
      <div class="message-content" id="msg-${index}">${html}</div>
      ${meta}
    </div>
  </div>`;
}

function renderMarkdown(text) {
  if (!text) return '';
  const renderer = new marked.Renderer();

  renderer.code = function(obj) {
    const code = typeof obj === 'object' ? obj.text : obj;
    const lang = (typeof obj === 'object' ? obj.lang : arguments[1]) || '';
    const escaped = escapeHtml(code);
    const langLabel = lang || 'code';
    return `<pre><div class="code-header"><span>${langLabel}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><code class="language-${lang}">${escaped}</code></pre>`;
  };

  marked.setOptions({ renderer, breaks: true, gfm: true });
  return marked.parse(text);
}

function highlightAll() {
  document.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code').textContent;
  navigator.clipboard.writeText(code);
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

// ===== Send & Stream =====
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  // Ensure conversation exists
  if (!currentConvId) newChat();
  const conv = getCurrentConv();
  if (!conv) return;

  // Block only if THIS conversation is streaming
  if (streamingConvs.has(conv.id)) return;

  // Add user message
  conv.messages.push({ role: 'user', content: text });

  // Update title from first message
  if (conv.messages.length === 1) {
    conv.title = text.slice(0, 50) + (text.length > 50 ? '...' : '');
    renderConvList();
  }

  input.value = '';
  autoResize(input);

  // Add empty assistant message
  const model = document.getElementById('modelSelect').value;
  const assistantMsg = { role: 'assistant', content: '', model };
  conv.messages.push(assistantMsg);
  saveConvs();
  renderMessages();

  // Stream — track per conversation
  const controller = new AbortController();
  const convId = conv.id;
  streamingConvs.set(convId, controller);
  updateSendBtn();
  renderConvList();

  try {
    const apiMessages = conv.messages.slice(0, -1).map(m => ({
      role: m.role,
      content: m.content,
    }));

    const resp = await fetch(`${API_BASE}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, messages: apiMessages, stream: true }),
      signal: controller.signal,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: { message: resp.statusText } }));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    const msgIndex = conv.messages.length - 1;

    // Only update DOM if this conversation is currently visible
    const getContentEl = () => currentConvId === convId ? document.getElementById(`msg-${msgIndex}`) : null;

    let contentEl = getContentEl();
    if (contentEl) contentEl.classList.add('streaming-cursor');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const chunk = JSON.parse(data);
          if (chunk.error) {
            throw new Error(chunk.error.message || 'Stream error');
          }
          const delta = chunk.choices?.[0]?.delta;
          if (delta?.content) {
            assistantMsg.content += delta.content;
            contentEl = getContentEl();
            if (contentEl) {
              contentEl.innerHTML = renderMarkdown(assistantMsg.content);
              highlightAll();
              scrollToBottom();
            }
          }
          if (chunk.usage) {
            assistantMsg.usage = chunk.usage;
          }
        } catch(e) {
          if (e.message && !e.message.includes('JSON')) throw e;
        }
      }
    }

    contentEl = getContentEl();
    if (contentEl) contentEl.classList.remove('streaming-cursor');

  } catch(e) {
    if (e.name === 'AbortError') {
      assistantMsg.content += '\n\n*[Stopped]*';
    } else {
      assistantMsg.content = `**Error:** ${e.message}`;
    }
  }

  streamingConvs.delete(convId);
  updateSendBtn();
  saveConvs();
  renderConvList();
  // Re-render if user is still viewing this conversation
  if (currentConvId === convId) renderMessages();
}

function stopStream() {
  const controller = streamingConvs.get(currentConvId);
  if (controller) controller.abort();
}

function isCurrentConvStreaming() {
  return streamingConvs.has(currentConvId);
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  if (isCurrentConvStreaming()) {
    btn.className = 'send-btn stop-btn';
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
    btn.onclick = stopStream;
  } else {
    btn.className = 'send-btn';
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
    btn.onclick = sendMessage;
  }
}

// ===== Helpers =====
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function scrollToBottom() {
  const container = document.getElementById('chatContainer');
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ===== Start =====
init();
</script>
</body>
</html>
