name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Check tag matches package version
        run: |
          PKG_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          # uv build drops a .gitignore into dist/ — only ship the artifacts
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

  # Optional PyPI publishing via trusted publishing.
  # To enable: create the project on PyPI, add a "trusted publisher" for this
  # repo/workflow (environment: pypi), then uncomment.
